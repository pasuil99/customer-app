function isWork(s){const d=new Date(s);return d.getDay()!==0&&d.getDay()!==6&&!HOLIDAYS[s];}

// gzip 압축 데이터 디코딩
async function decodeRaw(b64gz){
  const bin=atob(b64gz);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream("gzip");
  const writer=ds.writable.getWriter();
  writer.write(bytes);writer.close();
  const chunks=[];
  const reader=ds.readable.getReader();
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  const all=new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off=0;for(const c of chunks){all.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(all));
}

function App(){
  const [pg,setPg]=useState("dash");
  const [menu,setMenu]=useState(false);
  const [allCusts,setAllCusts]=useState([]);
  const [dayStatus,setDayStatus]=useState({});
  const [retryL,setRetryL]=useState([]);
  const [modal,setModal]=useState(null);
  const [selDate,setSelDate]=useState(TODAY);
  const [tab,setTab]=useState("pending");
  const [search,setSearch]=useState("");
  const [filterType,setFilter]=useState("전체");
  const [reasons,setReasons]=useState({});
  const [ready,setReady]=useState(false);
  const [sched,setSched]=useState([]);
  const [workdays,setWorkdays]=useState([]);
  const [addModal,setAddModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [delConfirm,setDelConfirm]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM);
  const [globalSearch,setGlobalSearch]=useState("");
  const [showGS,setShowGS]=useState(false);
  const gsRef=useRef(null);
  const todayHol=HOLIDAYS[TODAY]||"";
  const isWorkday=isWork(TODAY);

  // 앱 시작 시 항상 오늘 날짜로 리셋
  useEffect(()=>{setSelDate(TODAY);},[]);

  useEffect(()=>{
    (async()=>{
      let custs=await sg("v8_custs");
      let r=await sg("v8_retry")||[];
      // 시작일 고정: 최초 실행일 저장 후 항상 그 날짜 기준으로 일정 계산
      let startDate=await sg("v8_startDate");
      if(!startDate){startDate=TODAY;await ss("v8_startDate",startDate);}
      const wdays=getWorkdays(startDate,150);
      if(!custs||!custs.length){
        const raw=await decodeRaw(GZ);
        custs=raw.map((x,i)=>({...x,assigned:wdays[Math.floor(i/50)]||wdays[0]}));
        await ss("v8_custs",custs);
      }
      // v8_ds에서 기존 완료상태 마이그레이션 (한번만)
      let ds=await sg("v8_ds")||{};
      const hasMigrated=await sg("v8_migrated");
      if(!hasMigrated&&Object.keys(ds).length>0){
        // 기존 ds 데이터를 custs 안으로 통합
        const merged=custs.map(c=>{
          let statusData={};
          Object.entries(ds).forEach(([date,dayS])=>{
            if(dayS[c.id]){statusData[date]=dayS[c.id];}
          });
          return Object.keys(statusData).length>0?{...c,_s:statusData}:c;
        });
        custs=merged;
        await ss("v8_custs",custs);
        await ss("v8_migrated",true);
      }
      // custs에서 ds 재구성
      const rebuildDs=(cs)=>{
        const d={};
        cs.forEach(c=>{if(c._s){Object.entries(c._s).forEach(([date,st])=>{if(!d[date])d[date]={};d[date][c.id]=st;});}});
        return d;
      };
      const builtDs=rebuildDs(custs);
      setAllCusts(custs);setDayStatus(builtDs);setRetryL(r);
      setSched(bSched(wdays,custs,builtDs));setWorkdays(wdays);setReady(true);
    })();
  },[]);

  function bSched(wdays,custs,ds){
    return wdays.slice(0,60).map((day,i)=>{
      const s=i*50,e=Math.min((i+1)*50,custs.length);
      const dayS=ds[day]||{};
      return{day,count:e-s,done:custs.slice(s,e).filter(c=>(dayS[c.id]||{}).status==="done").length,isToday:day===TODAY};
    });
  }

  const getCusts=(date)=>{
    const idx=workdays.indexOf(date);if(idx<0)return[];
    const s=idx*50,e=Math.min((idx+1)*50,allCusts.length);
    const dayS=dayStatus[date]||{};
    return allCusts.slice(s,e).map(c=>{const st=dayS[c.id]||{};return{...c,...st,status:st.status||"pending"};});
  };
  const selDayCusts=useMemo(()=>getCusts(selDate),[allCusts,dayStatus,selDate,workdays]);
  const todayCusts=useMemo(()=>getCusts(TODAY),[allCusts,dayStatus,workdays]);

  const st=useMemo(()=>({
    done:selDayCusts.filter(c=>c.status==="done").length,
    pend:selDayCusts.filter(c=>c.status==="pending").length,
    retry:selDayCusts.filter(c=>c.status==="retry").length,
    total:selDayCusts.length,
    rp:retryL.filter(r=>r.status!=="done").length,
    tDone:todayCusts.filter(c=>c.status==="done").length,
    tTotal:todayCusts.length,
  }),[selDayCusts,todayCusts,retryL]);

  const globalResults=useMemo(()=>{
    const q=globalSearch.trim();if(!q)return[];
    return allCusts.filter(c=>
      (c.name&&c.name.includes(q))||(c.phone&&c.phone.includes(q))||
      (c.company&&c.company.includes(q))||(c.car&&c.car.includes(q))||
      (c.memo&&c.memo.includes(q))||(c.title&&c.title.includes(q))
    ).slice(0,50);
  },[allCusts,globalSearch]);

  const filtered=useMemo(()=>allCusts.filter(c=>{
    if(!c.name&&!c.phone)return false;
    const q=search;
    const mq=!q||(c.name&&c.name.includes(q))||(c.phone&&c.phone.includes(q))||(c.company&&c.company.includes(q))||(c.car&&c.car.includes(q))||(c.memo&&c.memo.includes(q));
    return mq&&(filterType==="전체"||c.type===filterType);
  }),[allCusts,search,filterType]);

  const updDS=async(date,id,upd)=>{
    const nds={...dayStatus,[date]:{...(dayStatus[date]||{}),[id]:{...(dayStatus[date]?.[id]||{}),...upd}}};
    setDayStatus(nds);
    const na=allCusts.map(c=>{if(c.id!==id)return c;const prevS=c._s||{};const newS={...prevS,[date]:{...(prevS[date]||{}),...upd}};return{...c,_s:newS};});
    setAllCusts(na);await ss("v8_custs",na);setSched(bSched(workdays,na,nds));
  };
  const markDone=async(id)=>{const now=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});await updDS(selDate,id,{status:"done",doneAt:now});};
  const markRetry=async(id)=>{
    const reason=reasons[`${selDate}_${id}`]||"부재중";
    const found=selDayCusts.find(x=>x.id===id);if(!found)return;
    const item={...found,reason,retryDate:addWork(selDate,7),addedAt:selDate,forDate:selDate,status:"retry"};
    const nr=[...retryL.filter(r=>!(r.id===id&&r.forDate===selDate)),item];
    setRetryL(nr);await ss("v8_retry",nr);await updDS(selDate,id,{status:"retry",reason});
  };
  const doneRetry=async(id,fd)=>{const now=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});const nr=retryL.map(r=>r.id===id&&r.forDate===fd?{...r,status:"done",doneAt:now}:r);setRetryL(nr);await ss("v8_retry",nr);await updDS(fd,id,{status:"done",doneAt:now});};
  const resetSt=async(id)=>await updDS(selDate,id,{status:"pending",doneAt:null,reason:null});

  const addCust=async()=>{
    if(!form.name.trim()){alert("이름을 입력해주세요");return;}
    const ni=Math.floor(allCusts.length/50);
    const nc={...form,id:Date.now(),assigned:workdays[ni]||workdays[workdays.length-1],createdAt:TODAY};
    const na=[...allCusts,nc];setAllCusts(na);await ss("v8_custs",na);setSched(bSched(workdays,na,dayStatus));
    setForm(EMPTY_FORM);setAddModal(false);alert(`✅ ${form.name}님 추가!
배정일: ${nc.assigned}`);
  };
  const editCust=async()=>{
    if(!form.name.trim()){alert("이름을 입력해주세요");return;}
    const na=allCusts.map(c=>c.id===editModal?{...c,...form}:c);
    setAllCusts(na);await ss("v8_custs",na);setSched(bSched(workdays,na,dayStatus));
    setEditModal(null);setForm(EMPTY_FORM);
  };
  const delCust=async(id)=>{
    const na=allCusts.filter(c=>c.id!==id).map((c,i)=>({...c,assigned:workdays[Math.floor(i/50)]||workdays[0]}));
    setAllCusts(na);await ss("v8_custs",na);setSched(bSched(workdays,na,dayStatus));
    setDelConfirm(null);setModal(null);
  };
  const openEdit=(c)=>{
    setForm({name:c.name||"",title:c.title||"",type:c.type||"가망",phone:c.phone||"",company:c.company||"",car:c.car||"",insuranceExp:c.insuranceExp||"",lastContact:c.lastContact||TODAY,contactCycle:c.contactCycle||3,nextContact:c.nextContact||"",memo:c.memo||""});
    setEditModal(c.id);setModal(null);
  };
  const openGS=()=>{setShowGS(true);setTimeout(()=>gsRef.current?.focus(),100);};
  const closeGS=()=>{setShowGS(false);setGlobalSearch("");};

  if(!ready)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(135deg,#1e3a5f,#2e86ab)",flexDirection:"column",gap:16}}>
      <div style={{fontSize:56}}>🚗</div>
      <div style={{color:"#fff",fontSize:22,fontWeight:900}}>고객관리 시스템</div>
      <div style={{width:200,height:5,background:"rgba(255,255,255,.2)",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",background:"#fff",borderRadius:5,animation:"ld 2s ease forwards"}}/></div>
      <div style={{color:"rgba(255,255,255,.7)",fontSize:13}}>2,278명 데이터 로딩 중...</div>
      <style>{`@keyframes ld{from{width:0}to{width:100%}}`}</style>
    </div>
  );

  const navs=[
    {id:"dash",icon:"📊",label:"대시보드"},
    {id:"manage",icon:"📅",label:"날짜관리",badge:st.tTotal-st.tDone>0?st.tTotal-st.tDone:0},
    {id:"sms",icon:"📨",label:"단체문자"},
    {id:"custs",icon:"👥",label:"전체고객"},
    {id:"retry",icon:"🔄",label:"재배정",badge:st.rp,red:true},
  ];
  const pgTitle={dash:"📊 대시보드",manage:"📅 날짜별 관리",custs:"👥 전체고객",sms:"📨 단체문자",sched:"🗓️ 일정표",retry:"🔄 재배정"};

  return(
    <div style={{fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif",background:"#f1f5f9",minHeight:"100vh",maxWidth:500,margin:"0 auto"}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0}button{cursor:pointer;font-family:inherit}a{text-decoration:none}textarea,input,select{font-family:inherit}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .2s ease}@keyframes sb{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}.sb{animation:sb .18s ease}@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.6)}70%{transform:scale(0.9)}100%{transform:scale(1)}}.pop{animation:pop .4s ease}`}</style>

      {menu&&<div onClick={()=>setMenu(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100}}/>}
      <div style={{position:"fixed",top:0,left:0,height:"100vh",width:220,background:"#1e293b",zIndex:200,transform:menu?"translateX(0)":"translateX(-100%)",transition:".3s",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"22px 18px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28}}>🚗</span>
          <div><div style={{color:"#fff",fontWeight:900,fontSize:15}}>고객관리</div><div style={{color:"#94a3b8",fontSize:10}}>총 {allCusts.length}명</div></div>
        </div>
        <button onClick={()=>{openGS();setMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"13px 18px",color:"#94a3b8",background:"none",border:"none",borderRight:"3px solid transparent",fontSize:13,textAlign:"left",width:"100%"}}>
          <span style={{fontSize:17,width:22,textAlign:"center"}}>🔍</span>고객 검색
        </button>
        {[...navs,{id:"sched",icon:"🗓️",label:"일정표"}].map(n=>(
          <button key={n.id} onClick={()=>{setPg(n.id);setMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"13px 18px",color:pg===n.id?"#fff":"#94a3b8",background:pg===n.id?"rgba(59,130,246,.2)":"none",border:"none",borderRight:pg===n.id?"3px solid #3b82f6":"3px solid transparent",fontSize:13,textAlign:"left",width:"100%"}}>
            <span style={{fontSize:17,width:22,textAlign:"center"}}>{n.icon}</span>{n.label}
            {n.badge>0&&<span style={{marginLeft:"auto",background:n.red?"#ef4444":"#f97316",color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{n.badge}</span>}
          </button>
        ))}
        <div style={{marginTop:"auto",padding:"10px 18px",borderTop:"1px solid rgba(255,255,255,.1)"}}>
          <button onClick={()=>{
            try{
              const data={
                customers:localStorage.getItem("custs"),
                schedule:localStorage.getItem("sched"),
                status:localStorage.getItem("status"),
                reasons:localStorage.getItem("reasons"),
                backupDate:new Date().toLocaleString("ko-KR")
              };
              const json=JSON.stringify(data,null,2);
              const blob=new Blob([json],{type:"application/json"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;
              a.download="고객관리_백업_"+new Date().toISOString().split("T")[0]+".json";
              a.click();
              URL.revokeObjectURL(url);
              alert("✅ 백업 완료!\n파일을 안전한 곳에 보관하세요.");
            }catch(e){alert("백업 실패: "+e.message);}
          }} style={{width:"100%",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:6}}>
            💾 데이터 백업
          </button>
          <label style={{width:"100%",display:"block",background:"#475569",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
            📂 백업 복원
            <input type="file" accept=".json" style={{display:"none"}} onChange={(e)=>{
              const file=e.target.files[0];
              if(!file)return;
              const reader=new FileReader();
              reader.onload=(ev)=>{
                try{
                  const data=JSON.parse(ev.target.result);
                  if(window.confirm("⚠️ 현재 데이터를 백업 파일로 덮어씁니다.\n계속하시겠습니까?")){
                    if(data.customers)localStorage.setItem("custs",data.customers);
                    if(data.schedule)localStorage.setItem("sched",data.schedule);
                    if(data.status)localStorage.setItem("status",data.status);
                    if(data.reasons)localStorage.setItem("reasons",data.reasons);
                    alert("✅ 복원 완료! 페이지를 새로고침합니다.");
                    window.location.reload();
                  }
                }catch(err){alert("복원 실패: 올바른 백업 파일이 아닙니다.");}
              };
              reader.readAsText(file);
              e.target.value="";
            }}/>
          </label>
        </div>
        <div style={{padding:"10px 18px",borderTop:"1px solid rgba(255,255,255,.1)",fontSize:11,color:"#94a3b8",display:"flex",justifyContent:"space-between"}}>
          <span>{allCusts.length}명</span><span style={{color:"#22c55e"}}>오늘완료 {st.tDone}명</span>
        </div>
      </div>

      <div style={{background:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
        <button onClick={()=>setMenu(true)} style={{background:"none",border:"none",fontSize:22,color:"#475569",padding:"2px 6px",lineHeight:1}}>☰</button>
        <div style={{fontWeight:700,fontSize:15,flex:1}}>{pgTitle[pg]}</div>
        <button onClick={openGS} style={{background:"#f1f5f9",border:"none",borderRadius:20,padding:"6px 12px",fontSize:12,color:"#475569",display:"flex",alignItems:"center",gap:5,fontWeight:600}}>🔍 검색</button>
        <div style={{fontSize:11,color:todayHol?"#ef4444":"#64748b",textAlign:"right",lineHeight:1.5,flexShrink:0}}>{TODAY}<br/>{todayHol?`🎌${todayHol}`:isWorkday?"영업일":"주말"}</div>
      </div>

      <div style={{padding:14,paddingBottom:82}} className="fi" key={pg}>
        {pg==="dash"&&<Dash st={st} todayCusts={todayCusts} sched={sched} hol={todayHol} isWork={isWorkday} nav={v=>{setPg(v);if(v==="manage")setSelDate(TODAY);}} setModal={setModal} total={allCusts.length} onSearch={openGS}/>}
        {pg==="manage"&&<ManageView custs={selDayCusts} st={st} tab={tab} setTab={setTab} selDate={selDate} setSelDate={setSelDate} sched={sched} onDone={markDone} onRetry={markRetry} onReset={resetSt} reasons={reasons} setReasons={setReasons} setModal={setModal} workdays={workdays}/>}
        {pg==="custs"&&<Custs filtered={filtered} total={allCusts.length} search={search} setSearch={setSearch} filterType={filterType} setFilter={setFilter} setModal={setModal} onAdd={()=>{setForm(EMPTY_FORM);setAddModal(true);}}/>}
        {pg==="sms"&&<SMS allCusts={allCusts} todayCusts={todayCusts}/>}
        {pg==="sched"&&<Sched sched={sched} selDate={selDate} setSelDate={setSelDate} nav={v=>setPg(v)}/>}
        {pg==="retry"&&<Retry retryL={retryL} onDone={doneRetry} setModal={setModal}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:500,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:50,boxShadow:"0 -2px 10px rgba(0,0,0,.08)"}}>
        {navs.map(n=>(
          <button key={n.id} onClick={()=>setPg(n.id)} style={{flex:1,padding:"8px 2px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:pg===n.id?"#3b82f6":"#94a3b8",position:"relative"}}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:pg===n.id?700:400}}>{n.label}</span>
            {n.badge>0&&<span style={{position:"absolute",top:3,right:"50%",marginRight:-20,background:n.red?"#ef4444":"#f97316",color:"#fff",borderRadius:10,padding:"0 5px",fontSize:9,fontWeight:700,minWidth:16,textAlign:"center"}}>{n.badge}</span>}
          </button>
        ))}
      </div>

      {/* 전역 검색 오버레이 */}
      {showGS&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.88)",zIndex:600,display:"flex",flexDirection:"column"}} className="sb">
          <div style={{background:"#fff",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px rgba(0,0,0,.2)"}}>
            <span style={{fontSize:20,flexShrink:0}}>🔍</span>
            <input ref={gsRef} value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)} placeholder="이름, 전화번호, 차량, 상호, 메모 검색..." style={{flex:1,border:"none",outline:"none",fontSize:16,background:"transparent"}} autoFocus/>
            {globalSearch&&<button onClick={()=>setGlobalSearch("")} style={{background:"#e2e8f0",border:"none",borderRadius:"50%",width:24,height:24,fontSize:13,color:"#64748b",flexShrink:0}}>✕</button>}
            <button onClick={closeGS} style={{background:"none",border:"none",color:"#3b82f6",fontSize:14,fontWeight:700,flexShrink:0,padding:"4px 8px"}}>취소</button>
          </div>
          <div style={{flex:1,overflow:"auto",padding:"12px 14px"}}>
            {!globalSearch.trim()&&(
              <div style={{textAlign:"center",paddingTop:60,color:"rgba(255,255,255,.5)"}}>
                <div style={{fontSize:48,marginBottom:12}}>🔍</div>
                <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>고객 통합 검색</div>
                <div style={{fontSize:13}}>이름, 전화번호, 차량명<br/>상호, 메모로 검색하세요</div>
              </div>
            )}
            {globalSearch.trim()&&globalResults.length===0&&(
              <div style={{textAlign:"center",paddingTop:60,color:"rgba(255,255,255,.5)"}}>
                <div style={{fontSize:48,marginBottom:12}}>😔</div>
                <div style={{fontSize:16,fontWeight:600}}>검색 결과 없음</div>
                <div style={{fontSize:13,marginTop:6}}>"{globalSearch}"</div>
              </div>
            )}
            {globalResults.length>0&&(
              <>
                <div style={{color:"rgba(255,255,255,.5)",fontSize:12,marginBottom:10}}>{globalResults.length}명 검색됨</div>
                {globalResults.map(c=>{
                  const q=globalSearch.trim();
                  const hl=(text)=>{if(!text||!q)return text;const idx=text.indexOf(q);if(idx<0)return text;return <>{text.slice(0,idx)}<mark style={{background:"#fbbf24",color:"#000",borderRadius:2,padding:"0 1px"}}>{q}</mark>{text.slice(idx+q.length)}</>;};
                  return(
                    <div key={c.id} onClick={()=>{setModal(c);closeGS();}} style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:c.type==="출고"?"#fef3c7":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:c.type==="출고"?"#92400e":"#3b82f6",flexShrink:0}}>{c.name?c.name[0]:"?"}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{hl(c.name)} <span style={{color:"#94a3b8",fontWeight:400,fontSize:12}}>{c.title}</span></div>
                        {c.phone&&<div style={{fontSize:12,color:"#3b82f6",marginBottom:1}}>📞 {hl(c.phone)}</div>}
                        {c.car&&<div style={{fontSize:11,color:"#64748b"}}>🚗 {hl(c.car)}</div>}
                        {c.company&&<div style={{fontSize:11,color:"#64748b"}}>🏢 {hl(c.company)}</div>}
                        {c.memo&&c.memo.includes(q)&&<div style={{fontSize:11,color:"#94a3b8",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {hl(c.memo)}</div>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                        <span style={{fontSize:10,background:c.type==="출고"?"#fef3c7":"#eff6ff",color:c.type==="출고"?"#92400e":"#3b82f6",borderRadius:6,padding:"2px 6px",fontWeight:600}}>{c.type}</span>
                        {c.phone&&<a href={`tel:${c.phone}`} onClick={e=>e.stopPropagation()} style={{background:"#22c55e",color:"#fff",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700}}>📞</a>}
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        </div>
      )}

      {modal&&<Modal c={modal} onClose={()=>setModal(null)} onEdit={openEdit} onDelete={id=>setDelConfirm(id)}/>}
      {(addModal||editModal!==null)&&<CustForm form={form} setForm={setForm} isEdit={editModal!==null} onSave={editModal!==null?editCust:addCust} onClose={()=>{setAddModal(false);setEditModal(null);setForm(EMPTY_FORM);}}/>}
      {delConfirm&&(
        <div onClick={()=>setDelConfirm(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div style={{fontWeight:800,fontSize:17,marginBottom:8}}>고객을 삭제할까요?</div>
            <div style={{color:"#64748b",fontSize:13,marginBottom:20}}>{allCusts.find(c=>c.id===delConfirm)?.name}님이<br/>영구 삭제됩니다.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:14,fontWeight:600}}>취소</button>
              <button onClick={()=>delCust(delConfirm)} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"#ef4444",color:"#fff",fontSize:14,fontWeight:700}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CustForm({form,setForm,isEdit,onSave,onClose}){
  const F=(k,v)=>setForm(p=>({...p,[k]:v}));
  const IS={width:"100%",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",background:"#f8fafc"};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"92vh",overflow:"auto"}}>
        <div style={{display:"flex",alignItems:"center",padding:"18px 20px 14px",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,background:"#fff",zIndex:10}}>
          <div style={{fontWeight:800,fontSize:17}}>{isEdit?"✏️ 고객 수정":"➕ 신규 고객 추가"}</div>
          <button onClick={onClose} style={{marginLeft:"auto",background:"#f1f5f9",border:"none",borderRadius:"50%",width:30,height:30,fontSize:16}}>✕</button>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
          {[["이름 *","name","text","고객 이름"],["호칭","title","text","사장님, 사모님..."],["전화번호","phone","tel","010-0000-0000"],["상호/소개","company","text","회사명"],["차량명","car","text","차량 정보"],["보험만기일","insuranceExp","date",""],["마지막접촉","lastContact","date",""],["다음접촉일","nextContact","date",""]].map(([l,k,t,ph])=>(
            <div key={k}><div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>{l}</div><input value={form[k]} onChange={e=>F(k,e.target.value)} placeholder={ph} type={t} style={IS}/></div>
          ))}
          <div><div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>구분</div><select value={form.type} onChange={e=>F("type",e.target.value)} style={IS}><option>가망</option><option>출고</option></select></div>
          <div><div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>접촉주기</div><select value={form.contactCycle} onChange={e=>F("contactCycle",Number(e.target.value))} style={IS}>{[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}개월</option>)}</select></div>
          <div><div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:5}}>메모</div><textarea value={form.memo} onChange={e=>F("memo",e.target.value)} placeholder="메모" rows={3} style={{...IS,resize:"vertical",lineHeight:1.5}}/></div>
          <button onClick={onSave} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",fontSize:16,fontWeight:800}}>{isEdit?"✅ 수정 완료":"✅ 고객 추가"}</button>
          <div style={{height:10}}/>
        </div>
      </div>
    </div>
  );
}

function Dash({st,todayCusts,sched,hol,isWork,nav,setModal,total,onSearch}){
  const pct=st.tTotal?Math.round(st.tDone/st.tTotal*100):0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2e86ab)",borderRadius:14,padding:20,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 8px 24px rgba(30,58,95,.3)"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,opacity:.8,marginBottom:3}}>{TODAY} ({WD[new Date().getDay()]})</div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>{hol?`🎌 ${hol}`:isWork?"🟢 오늘 관리 일정":"🔵 오늘은 주말"}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1,height:8,background:"rgba(255,255,255,.2)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"#22c55e",borderRadius:4,transition:"width .5s"}}/></div>
            <span style={{fontSize:13,fontWeight:700}}>{pct}%</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:14,flexShrink:0}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:900}}>{st.tDone}</div><div style={{fontSize:10,opacity:.8}}>완료</div></div>
          <div style={{opacity:.4,fontSize:16}}>/</div>
          <div style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:900,opacity:.6}}>{st.tTotal}</div><div style={{fontSize:10,opacity:.8}}>배정</div></div>
        </div>
      </div>
      <button onClick={onSearch} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,.06)",cursor:"pointer"}}>
        <span style={{fontSize:18}}>🔍</span>
        <span style={{flex:1,color:"#94a3b8",fontSize:14,textAlign:"left"}}>이름, 전화번호, 차량, 메모 검색...</span>
        <span style={{background:"#eff6ff",color:"#3b82f6",borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700}}>전체 {total}명</span>

        {steps.map((st,i)=>(
          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:s.color,color:s.id==="ppurio"?"#fff":"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}>{i+1}</div>
            <div style={{fontSize:12,color:"#475569",lineHeight:1.5,paddingTop:3}}>{st}</div>
          </div>
        ))}
        <a href={s.url} target="_blank" rel="noreferrer" style={{display:"block",marginTop:8,background:s.color,color:s.id==="aligo"?"#fff":s.id==="smspop"?"#fff":"#fff",borderRadius:10,padding:"11px",textAlign:"center",fontSize:13,fontWeight:700,textDecoration:"none"}}>
          🔗 {s.name} 사이트 바로가기
        </a>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      {/* STEP 1: 발송 대상 */}
      <div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#3b82f6",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>1</div>
          <div style={{fontWeight:700,fontSize:14}}>발송 대상 선택</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {Object.entries(targets).map(([k,v])=>(
            <button key={k} onClick={()=>setTarget(k)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:10,border:`2px solid ${target===k?"#3b82f6":"#e2e8f0"}`,background:target===k?"#eff6ff":"#f8fafc",cursor:"pointer",textAlign:"left",gridColumn:k==="all"?"span 2":""}}>
              <span style={{fontWeight:target===k?700:500,color:target===k?"#3b82f6":"#475569",fontSize:12}}>{v.label}</span>
              <span style={{background:target===k?"#3b82f6":"#e2e8f0",color:target===k?"#fff":"#64748b",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700,marginLeft:4,flexShrink:0}}>{v.list.length}명</span>
            </button>
          ))}
        </div>
        {sel.length===0&&<div style={{marginTop:8,background:"#fef2f2",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#dc2626"}}>⚠️ 전화번호가 등록된 고객이 없습니다</div>}
      </div>

      {/* STEP 2: 문자 종류 */}
      <div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#8b5cf6",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>2</div>
          <div style={{fontWeight:700,fontSize:14}}>문자 종류 선택</div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          {msgTypes.map(t=>(
            <button key={t.id} onClick={()=>setMsgType(t.id)} style={{flex:1,padding:"10px 4px",borderRadius:10,border:`2px solid ${msgType===t.id?t.color:"#e2e8f0"}`,background:msgType===t.id?t.id==="kakao"?"#FFF9C4":"#f5f3ff":"#f8fafc",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:12,fontWeight:800,color:msgType===t.id?(t.textColor||t.color):"#1e293b",whiteSpace:"pre-line",textAlign:"center",lineHeight:1.3}}>{t.label}</span>
              <span style={{fontSize:9,color:"#64748b"}}>{t.sub}</span>
              <span style={{fontSize:9,fontWeight:700,color:msgType===t.id?(t.textColor||t.color):"#94a3b8"}}>{t.price}</span>
            </button>
          ))}
        </div>
        <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",borderRadius:8,padding:"6px 10px"}}>
          💡 현재 내용 <strong>{charCount}자</strong> → 자동분류: <strong style={{color:charCount<=90?"#3b82f6":"#8b5cf6"}}>{autoType}</strong> 적용
        </div>
      </div>

      {/* STEP 3: 문자 내용 */}
      <div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#f97316",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>3</div>
          <div style={{fontWeight:700,fontSize:14}}>문자 내용 작성</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
          {SMS_TEMPLATES.map((t,i)=>(<button key={i} onClick={()=>{setTmpl(i);if(t.body)setBody(t.body);}} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${tmpl===i?"#f97316":"#e2e8f0"}`,background:tmpl===i?"#f97316":"#fff",color:tmpl===i?"#fff":"#475569",fontSize:11,fontWeight:tmpl===i?700:400}}>{t.title}</button>))}
        </div>
        <textarea value={body} onChange={e=>setBody(e.target.value)} rows={5} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",fontSize:13,resize:"vertical",outline:"none",lineHeight:1.6}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <div style={{fontSize:11,color:"#94a3b8"}}>💡 {"{이름}"} {"{호칭}"} 자동치환</div>
          <div style={{fontSize:11,fontWeight:700,color:charCount>90?"#8b5cf6":"#3b82f6"}}>{charCount}자</div>
        </div>
        {sel.length>0&&(
          <div style={{marginTop:8,background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:"#0284c7",fontWeight:700,marginBottom:4}}>👁️ 미리보기 ({sel[0].name||"고객"} 기준)</div>
            <div style={{fontSize:12,color:"#0c4a6e",whiteSpace:"pre-wrap",lineHeight:1.6}}>{preview}</div>
          </div>
        )}
      </div>

      {/* STEP 4: 발송 방법 */}
      <div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#22c55e",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>4</div>
          <div style={{fontWeight:700,fontSize:14}}>발송 방법 선택</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
          {methods.map(m=>(
            <button key={m.id} onClick={()=>{setMethod(m.id);setSvcStep(null);}} style={{padding:"12px 8px",borderRadius:12,border:`2px solid ${method===m.id?"#22c55e":"#e2e8f0"}`,background:method===m.id?"#f0fdf4":"#f8fafc",display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative",overflow:"hidden"}}>
              {method===m.id&&<div style={{position:"absolute",top:0,right:0,background:"#22c55e",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderBottomLeftRadius:8}}>선택됨</div>}
              <span style={{fontSize:22}}>{m.icon}</span>
              <span style={{fontSize:11,fontWeight:method===m.id?700:500,color:method===m.id?"#16a34a":"#1e293b",textAlign:"center",lineHeight:1.4,whiteSpace:"pre-line"}}>{m.label}</span>
              <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:method===m.id?"#22c55e":"#e2e8f0",color:method===m.id?"#fff":"#64748b",fontWeight:700}}>{m.badge}</span>
            </button>
          ))}
        </div>

        {/* CSV → 서비스 선택 */}
        {method==="csv"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#14532d",lineHeight:1.7}}>
              📋 CSV 내용이 클립보드에 복사됩니다. 메모장에 붙여넣기 후 .csv로 저장하거나 문자발송 사이트에 직접 붙여넣으세요. (<strong>{sel.length}명</strong>)
            </div>
            <button onClick={downloadCSV} style={{background:csvDone?"#22c55e":"#16a34a",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:900}}>
              {csvDone?"✅ CSV 복사완료! 메모장에 붙여넣기 하세요":"📊 CSV 클립보드 복사 ("+sel.length+"명)"}
            </button>
            {/* 서비스 선택 */}
            <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginTop:4}}>📤 발송 서비스 선택</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {services.map(s=>(
                <div key={s.id}>
                  <button onClick={()=>setSvcStep(svcStep===s.id?null:s.id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:10,border:`2px solid ${svcStep===s.id?s.color:"#e2e8f0"}`,background:svcStep===s.id?"#fff":"#f8fafc",cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontWeight:800,fontSize:14,color:s.color}}>{s.name}</span>
                      <span style={{background:s.color,color:"#fff",borderRadius:8,padding:"2px 7px",fontSize:10,fontWeight:700}}>{s.badge}</span>
                      <span style={{fontSize:12,color:"#64748b"}}>{s.desc}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#1e293b"}}>{s.price}</span>
                      <span style={{fontSize:12,color:"#94a3b8"}}>{svcStep===s.id?"▲":"▼"}</span>
                    </div>
                  </button>
                  {svcStep===s.id&&<SvcGuide svc={s.id}/>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 개별 문자앱 */}
        {method==="indiv"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#475569",lineHeight:1.7}}>
              📱 번호와 문자내용이 클립보드에 복사되고 문자앱이 열립니다. 내용을 붙여넣어 전송하세요.
            </div>
            <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {sel.length===0&&<div style={{textAlign:"center",padding:20,color:"#94a3b8",fontSize:13}}>전화번호 있는 고객 없음</div>}
              {sel.map((c,i)=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,background:indivSent[c.id]?"#f0fdf4":"#f8fafc",border:`1px solid ${indivSent[c.id]?"#bbf7d0":"#e2e8f0"}`}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:indivSent[c.id]?"#22c55e":"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:indivSent[c.id]?"#fff":"#64748b",flexShrink:0}}>{indivSent[c.id]?"✓":i+1}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{c.name||"이름없음"} <span style={{fontWeight:400,color:"#64748b",fontSize:11}}>{c.title||""}</span></div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{c.phone}</div>
                  </div>
                  <button onClick={()=>openSMS(c)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:indivSent[c.id]?"#dcfce7":"#3b82f6",color:indivSent[c.id]?"#16a34a":"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>{indivSent[c.id]?"재전송":"문자열기"}</button>
                </div>
              ))}
            </div>
            {sel.length>0&&<div style={{fontSize:11,color:"#94a3b8",textAlign:"center"}}>{Object.keys(indivSent).length}/{sel.length}명 발송됨</div>}
          </div>
        )}

        {/* 번호+내용 복사 */}
        {method==="copy"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#475569",lineHeight:1.7}}>
              📌 번호 복사 후 문자앱에 붙여넣기, 내용도 복사해서 사용하세요.
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>cp(sel.map(c=>c.phone).join(","),setNC)} style={{flex:1,background:numsCopied?"#22c55e":"#3b82f6",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:13,fontWeight:700}}>{numsCopied?"✅ 복사완료!":"📋 번호 복사 ("+sel.length+"개)"}</button>
              <button onClick={()=>cp(body,setBC)} style={{flex:1,background:bodyCopied?"#22c55e":"#8b5cf6",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:13,fontWeight:700}}>{bodyCopied?"✅ 복사완료!":"✏️ 내용 복사"}</button>
            </div>
          </div>
        )}

        {/* 카카오톡 공유 */}
        {method==="share"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#713f12",lineHeight:1.7}}>
              💬 카카오톡 등으로 공유하거나 전체 내용을 한 번에 복사합니다.
            </div>
            <div style={{background:"#f8fafc",borderRadius:10,padding:"12px",maxHeight:180,overflowY:"auto",fontSize:12,color:"#475569",whiteSpace:"pre-wrap",lineHeight:1.7,border:"1px solid #e2e8f0"}}>
              {sel.slice(0,2).map(c=>msgFor(c)).join("\n\n---\n\n")}{sel.length>2?`\n\n... 외 ${sel.length-2}명`:""}
            </div>
            <button onClick={shareAll} style={{background:"#FEE500",color:"#181600",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:900}}>
              💬 카카오톡으로 공유 ({sel.length}명)
            </button>
          </div>
        )}
      </div>

      {/* STEP 5: 예약 발송 */}
      <div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:useSchedule?12:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:"#6366f1",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>5</div>
            <div style={{fontWeight:700,fontSize:14}}>⏰ 예약 발송</div>
          </div>
          <button onClick={()=>setUseSched(p=>!p)} style={{position:"relative",width:44,height:24,borderRadius:12,border:"none",background:useSchedule?"#6366f1":"#e2e8f0",cursor:"pointer",transition:"background .2s"}}>
            <div style={{position:"absolute",top:3,left:useSchedule?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
          </button>
        </div>
        {useSchedule&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#3730a3",lineHeight:1.6}}>
              📌 아래 일시를 메모해두고 알리고·뿌리오 사이트 예약발송 기능에 동일하게 입력하세요.
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>📅 발송 날짜</div>
                <input type="date" value={schedDate} min={TODAY} onChange={e=>setSchedDate(e.target.value)}
                  style={{width:"100%",border:"1.5px solid #c7d2fe",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",background:"#f8fafc",color:"#1e293b"}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>🕐 발송 시간</div>
                <input type="time" value={schedTime} onChange={e=>setSchedTime(e.target.value)}
                  style={{width:"100%",border:"1.5px solid #c7d2fe",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",background:"#f8fafc",color:"#1e293b"}}/>
              </div>
            </div>
            <div style={{background:"#6366f1",borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:2}}>예약 발송 일시</div>
                <div style={{fontSize:15,fontWeight:900,color:"#fff"}}>{schedDate} {schedTime} · {sel.length}명</div>
              </div>
              <button onClick={()=>{const t=`예약발송: ${schedDate} ${schedTime}\n대상: ${sel.length}명\n내용:\n${body}`;navigator.clipboard.writeText(t).catch(()=>{});alert("예약 정보 복사 완료!\n알리고/뿌리오 사이트 예약발송에 입력하세요.");}} style={{background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.4)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                📋 복사
              </button>
            </div>
          </div>
        )}
      </div>

      {/* 요약 배너 */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:12,padding:14,color:"#fff"}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#94a3b8"}}>📋 발송 요약</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12}}>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#94a3b8",fontSize:10,marginBottom:2}}>발송 대상</div>
            <div style={{fontWeight:700}}>{targets[target].label.replace(/[📅⏳👥🎯🚗]/g,"").trim()} {sel.length}명</div>
          </div>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#94a3b8",fontSize:10,marginBottom:2}}>문자 종류</div>
            <div style={{fontWeight:700}}>{msgType.toUpperCase()} · {charCount}자</div>
          </div>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#94a3b8",fontSize:10,marginBottom:2}}>발송 방법</div>
            <div style={{fontWeight:700}}>{methods.find(m=>m.id===method)?.label.replace("\n"," ")}</div>
          </div>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"8px 10px"}}>
            <div style={{color:"#94a3b8",fontSize:10,marginBottom:2}}>예약 발송</div>
            <div style={{fontWeight:700}}>{useSchedule?`${schedDate} ${schedTime}`:"즉시 발송"}</div>
          </div>
        </div>
        <div style={{marginTop:8,background:"rgba(255,255,255,.06)",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#94a3b8"}}>
          예상 비용 (SMS 기준): <strong style={{color:"#fff"}}>약 {Math.ceil(sel.length*8.4).toLocaleString()}원~</strong>
        </div>
      </div>

    </div>
  );
}

function Sched({sched,selDate,setSelDate,nav}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"11px 14px",color:"#1d4ed8",fontSize:13}}>🗓️ 날짜 누르면 해당일 관리화면으로 이동</div>
      {sched.map((s,i)=>{
        const d=new Date(s.day),wd=WD[d.getDay()],hol=HOLIDAYS[s.day]||"",past=s.day<TODAY,pct=s.count?Math.round(s.done/s.count*100):0;
        return(
          <button key={i} onClick={()=>{setSelDate(s.day);nav("manage");}} style={{display:"flex",alignItems:"center",gap:8,borderRadius:10,padding:"10px 12px",background:s.isToday?"#eff6ff":past?"#f8fafc":"#fff",border:s.day===selDate?"2px solid #8b5cf6":s.isToday?"2px solid #3b82f6":"1px solid #e2e8f0",cursor:"pointer",width:"100%",textAlign:"left"}}>
            <div style={{width:30,fontSize:10,color:"#94a3b8"}}>{i+1}회</div>
            <div style={{flex:1,fontSize:12}}>
              <span style={{fontWeight:700,color:s.isToday?"#3b82f6":"#1e293b"}}>{s.day}</span>
              <span style={{color:d.getDay()===0?"#ef4444":d.getDay()===6?"#3b82f6":"#64748b",marginLeft:3}}>({wd})</span>
              {hol&&<span style={{marginLeft:4,background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"0 4px",fontSize:10}}>🎌{hol}</span>}
              {s.isToday&&<span style={{marginLeft:4,background:"#3b82f6",color:"#fff",borderRadius:4,padding:"0 5px",fontSize:10,fontWeight:700}}>오늘</span>}
            </div>
            <div style={{fontSize:11,color:"#64748b",width:26,textAlign:"center"}}>{s.count}</div>
            <div style={{display:"flex",alignItems:"center",gap:4,minWidth:60}}>
              <div style={{width:34,height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":"#3b82f6",borderRadius:3}}/></div>
              <span style={{fontSize:10,color:pct===100?"#22c55e":"#64748b",fontWeight:pct===100?700:400}}>{pct===100?"✓":pct>0?`${pct}%`:"0%"}</span>
            </div>
          </button>
        );
      })}
    </div>
  );
}

function Retry({retryL,onDone,setModal}){
  const pend=retryL.filter(r=>r.status!=="done");
  const done=retryL.filter(r=>r.status==="done");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"11px 14px",color:"#991b1b",fontSize:13}}>🔄 미완료 고객 <b>7 영업일 후</b> 재배정. 대기: <b style={{color:"#ef4444"}}>{pend.length}명</b></div>
      {pend.length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",fontSize:15}}>✅ 재배정 대기 없음!</div>}
      {pend.map(r=>{const isDue=r.retryDate<=TODAY;return(
        <div key={`${r.id}_${r.forDate}`} style={{background:"#fff",borderRadius:12,padding:14,border:isDue?"2px solid #ef4444":"1px solid #e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>setModal(r)}>{r.name} <span style={{color:"#94a3b8",fontWeight:400,fontSize:12}}>{r.title}</span></div>
            {isDue&&<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:700}}>🔴 오늘!</span>}
          </div>
          {r.phone&&<div style={{fontSize:12,color:"#3b82f6",marginBottom:3}}>📞 {r.phone}</div>}
          <div style={{display:"flex",gap:10,fontSize:11,color:"#64748b",flexWrap:"wrap",marginBottom:10}}>
            <span>원래날짜: {r.forDate}</span><span>사유: {r.reason}</span>
            <span style={{color:isDue?"#ef4444":"#3b82f6",fontWeight:600}}>재배정일: {r.retryDate}</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>onDone(r.id,r.forDate)} style={{flex:1,background:"#22c55e",color:"#fff",border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:700}}>✓ 완료처리</button>
            {r.phone&&<a href={`tel:${r.phone}`} style={{background:"#3b82f6",color:"#fff",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700}}>📞전화</a>}
          </div>
        </div>
      );})}
      {done.length>0&&<details><summary style={{cursor:"pointer",color:"#64748b",padding:"8px 0",fontSize:13}}>완료된 재배정 ({done.length}명)</summary>{done.map(r=>(<div key={r.id+"d"} style={{background:"#f0fdf4",borderRadius:10,padding:"10px 12px",marginTop:6,border:"1px solid #bbf7d0"}}><div style={{fontWeight:600,fontSize:13}}>{r.name} {r.title}</div><div style={{fontSize:11,color:"#22c55e"}}>✓ {r.doneAt}</div></div>))}</details>}
    </div>
  );
}

function Modal({c,onClose,onEdit,onDelete}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"85vh",overflow:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"18px 20px 14px",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,background:"#fff"}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:c.type==="출고"?"#fef3c7":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:c.type==="출고"?"#92400e":"#3b82f6",flexShrink:0}}>{c.name?c.name[0]:"?"}</div>
          <div><div style={{fontWeight:800,fontSize:17}}>{c.name}</div><div style={{color:"#64748b",fontSize:12}}>{c.title} · <span style={{color:c.type==="출고"?"#92400e":"#3b82f6",fontWeight:600}}>{c.type}</span></div></div>
          <button onClick={onClose} style={{marginLeft:"auto",background:"#f1f5f9",border:"none",borderRadius:"50%",width:30,height:30,fontSize:16}}>✕</button>
        </div>
        <div style={{padding:"14px 20px",display:"flex",flexDirection:"column",gap:10}}>
          {[["📞 전화번호",c.phone],["🏢 상호/소개",c.company],["🚗 차량명",c.car],["📅 보험만기일",c.insuranceExp],["🕐 마지막접촉",c.lastContact],["📆 다음접촉",c.nextContact],["⏱ 접촉주기",c.contactCycle?`${c.contactCycle}개월`:null],["📝 메모",c.memo]].filter(r=>r[1]).map((r,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{width:95,color:"#64748b",fontSize:12,flexShrink:0,paddingTop:2}}>{r[0]}</span>
              {r[0]==="📞 전화번호"?<a href={`tel:${r[1]}`} style={{fontSize:14,color:"#3b82f6",fontWeight:700}}>{r[1]}</a>:<span style={{fontSize:13}}>{r[1]}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"0 20px 8px",display:"flex",gap:8}}>
          <button onClick={()=>onEdit(c)} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"#eff6ff",color:"#3b82f6",fontSize:13,fontWeight:700}}>✏️ 수정</button>
          <button onClick={()=>onDelete(c.id)} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"#fef2f2",color:"#ef4444",fontSize:13,fontWeight:700}}>🗑️ 삭제</button>
        </div>
        {c.phone&&<a href={`tel:${c.phone}`} style={{display:"block",margin:"0 20px 20px",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",textAlign:"center",padding:"14px",borderRadius:12,fontWeight:700,fontSize:15}}>📞 지금 전화하기</a>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// PWA Service Worker 등록
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    // Inline service worker
    const sw = `
self.addEventListener('fetch', function(e){
  e.respondWith(fetch(e.request).catch(()=>new Response('오프라인 상태입니다', {status:503})));
});
`;
    const blob = new Blob([sw], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>
</body>
</html>
